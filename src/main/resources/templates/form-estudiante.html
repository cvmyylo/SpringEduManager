<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Nuevo Estudiante</title></head>
<body>
    <h2>Registrar Estudiante</h2>
    <form th:action="@{/estudiantes}" th:object="${estudiante}" method="post">
        <label>Nombre:</label>
        <input type="text" th:field="*{nombre}" required /><br/>
        <label>Email:</label>
        <input type="email" th:field="*{email}" required /><br/>
        <button type="submit">Guardar</button>
    </form>
    <br><a th:href="@{/estudiantes}">Cancelar</a>
</body>
</html><head>
