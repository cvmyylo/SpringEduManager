<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Nuevo Curso</title></head>
<body>
    <h2>Registrar Nuevo Curso</h2>
    <form th:action="@{/cursos}" th:object="${curso}" method="post">
        <label>Título:</label>
        <input type="text" th:field="*{titulo}" required /><br/>
        <label>Descripción:</label>
        <input type="text" th:field="*{descripcion}" required /><br/>
        <button type="submit">Guardar</button>
    </form>
    <br><a th:href="@{/cursos}">Cancelar</a>
</body>
